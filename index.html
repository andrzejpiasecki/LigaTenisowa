<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Ligi Tenisowej</title>
  <meta name="description" content="Dashboard ligi tenisowej z danymi meczy i tabelą punktową.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">
  <link rel="icon" href="/icon.svg?v=2" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png?v=2">
  <link rel="manifest" href="site.webmanifest?v=2">
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">Tenisv.pl</p>
      <h1>Dashboard Ligi Tenisowej</h1>
      <p class="subtitle">
        <a
        class="author-link"
        target="_blank"
        href="https://www.linkedin.com/in/andrzej-piasecki-9083a91/">
        Autor
      </a></p>
    </header>

    <section class="panel controls" aria-label="Filtry">
      <div class="panel-head">
        <h2>Opcje</h2>
        <button id="toggleControlsButton" type="button" class="toggle-button" aria-expanded="true">Zwiń</button>
      </div>
      <div id="controlsContent" class="controls-grid">
        <label>
          Sezon
          <select id="seasonSelect"></select>
        </label>
        <label>
          Liga
          <select id="leagueSelect"></select>
        </label>
        <label>
          Gracz
          <select id="playerSelect"></select>
        </label>
        <button id="refreshButton" type="button">Odśwież dane</button>
      </div>
    </section>

    <section class="stats-grid" aria-label="Podsumowanie gracza">
      <article class="stat-card">
        <h2>Mecze</h2>
        <p class="split-stat"><span id="playedCount">0</span><span class="split-separator">/</span><span id="remainingCount">0</span></p>
      </article>
      <article class="stat-card">
        <h2>Punkty</h2>
        <p id="playerPoints">0</p>
      </article>
      <article class="stat-card">
        <h2>Pozycja</h2>
        <p id="playerPosition">-</p>
      </article>
    </section>

    <section class="panel" aria-label="Tabela ligowa">
      <div class="panel-head">
        <h2>Tabela</h2>
        <p id="statusText">Ładowanie...</p>
      </div>
      <div class="table-wrap">
        <table id="standingsTable">
          <thead>
            <tr>
              <th>#</th>
              <th data-sort-key="player">Gracz</th>
              <th data-sort-key="points">Pkt</th>
              <th data-sort-key="maxAvgPoints">Pred</th>
              <th data-sort-key="wins">Z</th>
              <th data-sort-key="losses">P</th>
              <th data-sort-key="setsDiff">Sety</th>
              <th data-sort-key="maxPoints">Max</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="panel" aria-label="Mecze gracza">
      <h2>Mecze rozegrane wybranego gracza</h2>
      <div class="table-wrap">
        <table id="playerMatchesTable">
          <thead>
            <tr>
              <th>Data</th>
              <th>Przeciwnik</th>
              <th>Wynik</th>
              <th>Punkty</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section class="panel" aria-label="Mecze pozostałe">
      <h2>Mecze pozostałe do rozegrania</h2>
      <div id="remainingMatchesList"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
